<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxera — My Transcripts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; padding: 24px; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { background: #1a1a2e; color: #fff; padding: 24px; border-radius: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; }
    .back-btn { background: #EF9F27; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .back-btn:hover { background: #f0b03c; }
    .transcripts-list { display: flex; flex-direction: column; gap: 12px; }
    .transcript-item { background: #fff; padding: 16px; border-radius: 10px; border-left: 4px solid #EF9F27; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .transcript-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .date { font-weight: 700; color: #1a1a2e; font-size: 16px; }
    .details { display: flex; gap: 16px; font-size: 13px; color: #777; margin-top: 8px; }
    .action-buttons { display: flex; gap: 10px; margin-top: 12px; }
    .view-btn, .download-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .view-btn { background: #1a1a2e; color: #fff; }
    .view-btn:hover { background: #2a2a4e; }
    .download-btn { background: #EF9F27; color: #1a1a2e; }
    .download-btn:hover { background: #f0b03c; }
    .empty { text-align: center; padding: 40px; color: #999; background: #fff; border-radius: 10px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; border-radius: 12px; max-width: 700px; max-height: 80vh; overflow-y: auto; padding: 24px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #eee; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .conversation-text { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.8; background: #f8f8f5; padding: 16px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📋 My Transcripts</h1>
    <button class="back-btn" onclick="window.location.href='voice_chat.html'">← Back to App</button>
  </div>

  <div class="transcripts-list" id="transcripts-list">
    <div class="empty">Loading your transcripts...</div>
  </div>
</div>

<div class="modal" id="transcript-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Transcript</h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="conversation-detail"></div>
  </div>
</div>

<script>
  function loadMyTranscripts() {
    const currentUser = localStorage.getItem('currentUser');
    const allTranscripts = JSON.parse(localStorage.getItem('transcripts') || '[]');
    const myTranscripts = allTranscripts.filter(t => t.username === currentUser);

    const list = document.getElementById('transcripts-list');
    
    if (myTranscripts.length === 0) {
      list.innerHTML = '<div class="empty">No transcripts yet. Start a conversation!</div>';
      return;
    }

    list.innerHTML = myTranscripts.map((transcript, idx) => `
      <div class="transcript-item">
        <div class="date">${new Date(transcript.timestamp).toLocaleDateString()} ${new Date(transcript.timestamp).toLocaleTimeString()}</div>
        <div class="details">
          <span>${transcript.conversations.length} exchanges</span>
        </div>
        <div class="action-buttons">
          <button class="view-btn" onclick="viewTranscript(${idx})">👁️ View</button>
          <button class="download-btn" onclick="downloadAsText(${idx})">⬇️ Download (TXT)</button>
        </div>
      </div>
    `).join('');
  }

  function viewTranscript(idx) {
    const currentUser = localStorage.getItem('currentUser');
    const allTranscripts = JSON.parse(localStorage.getItem('transcripts') || '[]');
    const myTranscripts = allTranscripts.filter(t => t.username === currentUser);
    const transcript = myTranscripts[idx];

    let textContent = '';
    transcript.conversations.forEach(msg => {
      const speaker = msg.role === 'user' ? 'YOU' : 'VOXERA';
      textContent += `[${speaker}]\n${msg.content}\n\n`;
    });

    document.getElementById('conversation-detail').innerHTML = `<div class="conversation-text">${textContent}</div>`;
    document.getElementById('modal-title').textContent = `Transcript - ${new Date(transcript.timestamp).toLocaleDateString()}`;
    document.getElementById('transcript-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('transcript-modal').classList.remove('active');
  }

  function downloadAsText(idx) {
    const currentUser = localStorage.getItem('currentUser');
    const allTranscripts = JSON.parse(localStorage.getItem('transcripts') || '[]');
    const myTranscripts = allTranscripts.filter(t => t.username === currentUser);
    const transcript = myTranscripts[idx];

    let textContent = `VOXERA INTERVIEW TRANSCRIPT\nUser: ${currentUser}\nDate: ${new Date(transcript.timestamp).toLocaleString()}\n\n---\n\n`;
    
    transcript.conversations.forEach(msg => {
      const speaker = msg.role === 'user' ? 'YOU' : 'VOXERA';
      textContent += `[${speaker}]\n${msg.content}\n\n`;
    });

    const blob = new Blob([textContent], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `transcript_${currentUser}_${new Date(transcript.timestamp).toISOString().split('T')[0]}.txt`;
    a.click();
  }

  loadMyTranscripts();
</script>

</body>
</html>
