<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxera Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 28px rgba(0,0,0,0.10); width: 100%; max-width: 400px; }
    .logo-mark { width: 48px; height: 48px; border-radius: 8px; background: #94FF33; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #1a1a1a; margin: 0 auto 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #EF9F27; }
    .login-btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .login-btn:hover { background: #2a2a4e; }
    .error { color: #c0392b; font-size: 13px; margin-top: 12px; text-align: center; }
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .dashboard-header { background: #1a1a2e; color: #fff; padding: 24px; display: flex; justify-content: space-between; align-items: center; }
    .logout-btn { background: #EF9F27; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .dashboard-content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .add-user-btn { background: #1a1a2e; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
    .add-user-btn:hover { background: #2a2a4e; }
    .users-list { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th { background: #f8f8f5; padding: 16px; text-align: left; font-weight: 600; color: #1a1a2e; border-bottom: 2px solid #eee; }
    .users-table td { padding: 16px; border-bottom: 1px solid #eee; }
    .users-table tr:hover { background: #f9f9f6; }
    .empty { text-align: center; padding: 40px; color: #999; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; border-radius: 12px; padding: 32px; width: 90%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h2 { font-size: 20px; color: #1a1a2e; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
    .form-group-modal { margin-bottom: 16px; }
    .form-group-modal label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; text-transform: uppercase; }
    .form-group-modal input, .form-group-modal select { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; }
    .form-group-modal input:focus, .form-group-modal select:focus { outline: none; border-color: #EF9F27; }
    .modal-btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 16px; }
    .modal-btn:hover { background: #2a2a4e; }
  </style>
</head>
<body>

<div class="login-container" id="login-screen">
  <div class="login-box">
    <div style="text-align: center; margin-bottom: 30px;">
      <div class="logo-mark">D2N</div>
      <h1 style="font-size: 24px; color: #1a1a2e; margin-bottom: 8px;">Admin Panel</h1>
      <p style="color: #999; font-size: 14px;">Voxera Administration</p>
    </div>
    <form onsubmit="handleAdminLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="admin-username" placeholder="Enter admin username" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="Enter admin password" required />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div class="error" id="login-error"></div>
    </form>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dashboard-header">
    <h1>🔐 Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="dashboard-content">
    <button class="add-user-btn" onclick="openAddUserModal()">+ Add New User</button>

    <div class="users-list">
      <table class="users-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Password</th>
            <th>Expiry Hours</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="4" class="empty">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal" id="add-user-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Add New User</h2>
      <button class="close-btn" onclick="closeAddUserModal()">×</button>
    </div>
    <form onsubmit="saveNewUser(event)">
      <div class="form-group-modal">
        <label>Username</label>
        <input type="text" id="new-username" placeholder="e.g., john" required />
      </div>
      <div class="form-group-modal">
        <label>Password</label>
        <input type="text" id="new-password" placeholder="e.g., SecurePass123" required />
      </div>
      <div class="form-group-modal">
        <label>Expiry Hours</label>
        <select id="new-expiry" required>
          <option value="2">2 hours</option>
          <option value="5">5 hours</option>
          <option value="8">8 hours</option>
          <option value="24" selected>24 hours</option>
          <option value="48">48 hours</option>
          <option value="168">7 days</option>
        </select>
      </div>
      <button type="submit" class="modal-btn">Create User</button>
    </form>
  </div>
</div>

<script>
  const ADMIN_USERNAME = 'D2nlmedia';
  const ADMIN_PASSWORD = 'TempPwd@2026';

  function handleAdminLogin(event) {
    event.preventDefault();
    const username = document.getElementById('admin-username').value;
    const password = document.getElementById('admin-password').value;

    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      loadUsers();
    } else {
      document.getElementById('login-error').textContent = 'Invalid credentials';
    }
  }

  function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    location.reload();
  }

  function openAddUserModal() {
    document.getElementById('add-user-modal').classList.add('active');
  }

  function closeAddUserModal() {
    document.getElementById('add-user-modal').classList.remove('active');
  }

  async function saveNewUser(event) {
    event.preventDefault();
    const username = document.getElementById('new-username').value;
    const password = document.getElementById('new-password').value;
    const expiryHours = parseInt(document.getElementById('new-expiry').value);

    try {
      const res = await fetch('/api/update-users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'add', username, password, expiryHours })
      });

      const data = await res.json();
      if (data.success) {
        closeAddUserModal();
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        loadUsers();
        alert('User created successfully!');
      } else {
        alert('Error: ' + data.message);
      }
    } catch (error) {
      alert('Error creating user');
    }
  }

  async function loadUsers() {
    try {
      const response = await fetch('/api/get-users');
      const data = await response.json();
      const tbody = document.getElementById('users-tbody');

      if (!data.users || data.users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = data.users.map(user => `
        <tr>
          <td><strong>${user.username}</strong></td>
          <td>${user.password}</td>
          <td>${user.expiryHours} hours</td>
          <td>${new Date(user.createdAt).toLocaleDateString()}</td>
        </tr>
      `).join('');
    } catch (error) {
      console.error('Error loading users:', error);
    }
  }

  if (sessionStorage.getItem('adminLoggedIn')) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    loadUsers();
  }
</script>

</body>
</html>
