<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxera  Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; }
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 28px rgba(0,0,0,0.10); width: 100%; max-width: 400px; }
    .logo-mark { width: 48px; height: 48px; border-radius: 8px; background: #94FF33; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #1a1a1a; margin: 0 auto 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #EF9F27; }
    .login-btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
    .login-btn:hover { background: #2a2a4e; }
    .error { color: #c0392b; font-size: 13px; margin-top: 12px; text-align: center; }
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .dashboard-header { background: #1a1a2e; color: #fff; padding: 24px; display: flex; justify-content: space-between; align-items: center; }
    .logout-btn { background: #EF9F27; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .dashboard-content { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .users-list { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th { background: #f8f8f5; padding: 16px; text-align: left; font-weight: 600; color: #1a1a2e; border-bottom: 2px solid #eee; }
    .users-table td { padding: 16px; border-bottom: 1px solid #eee; }
    .users-table tr:hover { background: #f9f9f6; }
    .info-box { background: #e3f2fd; color: #1565c0; padding: 16px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #1565c0; }
    .info-box a { color: #1565c0; text-decoration: underline; }
    .empty { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>

<div class="login-container" id="login-screen">
  <div class="login-box">
    <div style="text-align: center; margin-bottom: 30px;">
      <div class="logo-mark">D2N</div>
      <h1 style="font-size: 24px; color: #1a1a2e; margin-bottom: 8px;">Admin Panel</h1>
      <p style="color: #999; font-size: 14px;">Voxera Administration</p>
    </div>
    <form onsubmit="handleAdminLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="admin-username" placeholder="Enter admin username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-password" placeholder="Enter admin password" required />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div class="error" id="login-error"></div>
    </form>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="dashboard-header">
    <h1> Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="dashboard-content">
    <div class="info-box">
      <strong>ℹ User Management:</strong> To add, edit, or delete users, edit the <code>users.json</code> file on GitHub: <a href="https://github.com/dndeva/Voxera/blob/main/users.json" target="_blank">users.json</a>
    </div>

    <div class="users-list">
      <table class="users-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Password</th>
            <th>Expiry Hours</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="4" class="empty">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const ADMIN_USERNAME = 'D2nlmedia';
  const ADMIN_PASSWORD = 'TempPwd@2026';

  function handleAdminLogin(event) {
    event.preventDefault();
    const username = document.getElementById('admin-username').value;
    const password = document.getElementById('admin-password').value;

    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      loadUsers();
    } else {
      document.getElementById('login-error').textContent = 'Invalid username or password';
    }
  }

  function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').classList.remove('active');
    document.getElementById('admin-username').value = '';
    document.getElementById('admin-password').value = '';
  }

  async function loadUsers() {
    try {
      const response = await fetch('/api/get-users');
      const data = await response.json();
      const tbody = document.getElementById('users-tbody');

      if (!data.users || data.users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">No users found</td></tr>';
        return;
      }

      tbody.innerHTML = data.users.map(user => `
        <tr>
          <td><strong>${user.username}</strong></td>
          <td>${user.password}</td>
          <td>${user.expiryHours} hours</td>
          <td>${new Date(user.createdAt).toLocaleDateString()}</td>
        </tr>
      `).join('');
    } catch (error) {
      console.error('Error loading users:', error);
    }
  }

  if (!sessionStorage.getItem('adminLoggedIn')) {
    document.getElementById('login-screen').style.display = 'flex';
  } else {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').classList.add('active');
    loadUsers();
  }
</script>

</body>
</html>
