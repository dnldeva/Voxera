<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voxera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; }
  
  .hidden { display: none !important; }
  
  #loginPage { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .login-box { width: 100%; max-width: 400px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .logo { width: 50px; height: 50px; background: #94FF33; border-radius: 8px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #1a1a2e; }
  .login-box h1 { font-size: 24px; color: #1a1a2e; text-align: center; margin-bottom: 8px; }
  .login-box p { text-align: center; color: #999; margin-bottom: 30px; font-size: 13px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; text-transform: uppercase; }
  .form-group input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #EF9F27; }
  .login-btn { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 20px; }
  .login-btn:hover { background: #2a2a4e; }
  .error { color: #c0392b; font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }
  
  #appPage { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .app-box { width: 100%; max-width: 650px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
  
  .header { padding: 16px 24px; background: #1a1a2e; display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 36px; height: 36px; background: #94FF33; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #1a1a1a; font-size: 12px; }
  .header-text { flex: 1; }
  .header-text h2 { font-size: 16px; color: white; margin-bottom: 2px; }
  .header-text p { font-size: 9px; color: #EF9F27; text-transform: uppercase; letter-spacing: 1px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 10px; background: rgba(239,159,39,0.15); color: #EF9F27; padding: 3px 10px; border-radius: 20px; }
  .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }
  
  .toggle-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #f8f8f5; border-bottom: 1px solid #eee; }
  .toggle-label { font-size: 11px; color: #777; font-weight: 600; }
  .transcripts-link { font-size: 10px; color: #EF9F27; text-decoration: underline; cursor: pointer; }
  
  .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; max-height: 350px; }
  .message { display: flex; gap: 10px; }
  .message.user { flex-direction: row-reverse; }
  .message.ai { flex-direction: row; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai { background: #94FF33; color: #1a1a1a; }
  .avatar.user { background: #1a1a2e; color: #EF9F27; }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
  .message.user .bubble { background: #f0f0f8; color: #1a1a2e; }
  .message.ai .bubble { background: #FFF8EC; color: #5a3e00; }
  
  .transcript-box { margin: 0 16px 10px 16px; min-height: 50px; padding: 10px 14px; background: #f8f8f5; border-radius: 8px; border: 1.5px dashed #ddd; color: #999; font-size: 13px; display: flex; align-items: center; }
  .transcript-box.recording { background: #fff8f8; border-color: #E24B4A; color: #333; }
  
  .bottom { padding: 14px 20px; border-top: 1px solid #eee; background: #fafafa; }
  .bottom-content { display: flex; justify-content: space-between; align-items: flex-end; gap: 14px; margin-top: 12px; }
  .bottom-left { display: flex; flex-direction: column; flex: 1; }
  .bottom-right { display: flex; gap: 14px; align-items: center; }
  
  .btn-record { width: 66px; height: 66px; border-radius: 50%; border: 2.5px solid #1a1a2e; background: white; cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .btn-record:hover { background: #1a1a2e; color: #EF9F27; }
  .btn-record.listening { background: #1a1a2e; color: #E24B4A; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.3)} 50%{box-shadow:0 0 0 10px rgba(226,75,74,0)} }
  
  .btn-go { width: 78px; height: 78px; border-radius: 50%; border: none; background: #1a1a2e; color: #EF9F27; font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(26,26,46,0.3); flex-shrink: 0; }
  .btn-go:hover { background: #2a2a4e; transform: scale(1.05); }
  .btn-go:active { transform: scale(0.97); }
  .btn-go:disabled { opacity: 0.6; cursor: not-allowed; }
  
  .status { font-size: 12px; color: #999; min-height: 16px; }
  .error-text { font-size: 11px; color: #c0392b; min-height: 14px; margin-top: 4px; }
  
  .footer { padding: 10px 24px; background: #1a1a2e; font-size: 10px; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo">D2N</div>
    <h1>Voxera</h1>
    <p>AI Interview Assistant</p>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="user">Username</label>
        <input type="text" id="user" placeholder="alice" required autofocus />
      </div>
      <div class="form-group">
        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="password123" required />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div class="error" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="appPage" class="hidden">
  <div class="app-box">
    <div class="header">
      <div class="header-logo">D2N</div>
      <div class="header-text">
        <h2>Voxera</h2>
        <p>D2NL Midea</p>
      </div>
      <div class="header-right">
        <span class="badge">Pro</span>
        <div class="dot"></div>
      </div>
    </div>

    <div class="toggle-bar">
      <span class="toggle-label">📡 System Audio Mode</span>
      <span class="transcripts-link" onclick="goTranscripts()">📋 My Transcripts</span>
    </div>

    <div class="messages" id="msgList">
      <div class="message ai">
        <div class="avatar ai">D2N</div>
        <div class="bubble">Welcome! Press Record to capture system audio, then GO for an answer.</div>
      </div>
    </div>

    <div class="transcript-box" id="transcriptBox">Audio transcript will appear here...</div>

    <div class="bottom">
      <div class="bottom-content">
        <div class="bottom-left">
          <div class="status" id="statusText">Ready — press Record to begin</div>
          <div class="error-text" id="errorText"></div>
        </div>
        <div class="bottom-right">
          <button type="button" class="btn-record" id="recordBtn" onclick="clickRecord()">🎙️</button>
          <button type="button" class="btn-go" id="goBtn" onclick="clickGO()">GO</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>© 2026 D2NL Midea</span>
      <span>Voxera v3.5</span>
    </div>
  </div>
</div>

<script>
  const USERS = { 'alice': 'password123', 'bob': 'securepass456', 'charlie': 'mypassword789' };
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

  let currentUser = null;
  let conversation = [];
  let isRecording = false;
  let recordedText = '';
  let mediaStream = null;
  let recognizer = null;

  // ===== LOGIN =====
  function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    
    if (!u || !p) {
      document.getElementById('loginErr').textContent = 'Enter credentials';
      return;
    }

    if (USERS[u] !== p) {
      document.getElementById('loginErr').textContent = 'Invalid credentials';
      document.getElementById('pass').value = '';
      return;
    }

    currentUser = u;
    localStorage.setItem('currentUser', u);
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
  }

  // ===== RECORD BUTTON =====
  async function clickRecord() {
    console.log('Record button clicked, isRecording:', isRecording);

    if (isRecording) {
      console.log('Already recording, stopping...');
      stopRecord();
      return;
    }

    if (!SpeechRec) {
      showError('SpeechRecognition not available in this browser');
      console.error('SpeechRecognition not available');
      return;
    }

    isRecording = true;
    recordedText = '';
    clearError();

    const btn = document.getElementById('recordBtn');
    btn.classList.add('listening');
    
    setStatus('📡 Requesting screen share...');
    console.log('Requesting getDisplayMedia...');

    try {
      mediaStream = await navigator.mediaDevices.getDisplayMedia({
        video: false,
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });

      console.log('✅ Got media stream');
      setStatus('📡 Recording system audio... (click to stop)');
      setTranscript('', true);
      startSpeechRecognition();

    } catch (error) {
      console.error('Error getting display media:', error);
      isRecording = false;
      btn.classList.remove('listening');
      
      if (error.name === 'NotAllowedError') {
        showError('Screen share was cancelled');
      } else if (error.name === 'NotSupportedError') {
        showError('Screen share not supported in this browser');
      } else {
        showError('Error: ' + error.message);
      }
    }
  }

  function startSpeechRecognition() {
    console.log('Starting speech recognition...');
    
    recognizer = new SpeechRec();
    recognizer.lang = 'en-GB';
    recognizer.continuous = true;
    recognizer.interimResults = true;

    recognizer.onstart = () => {
      console.log('Speech recognition started');
    };

    recognizer.onresult = (event) => {
      console.log('onresult:', event);
      let interim = '';
      
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        console.log('Transcript:', transcript, 'isFinal:', event.results[i].isFinal);
        
        if (event.results[i].isFinal) {
          recordedText += transcript + ' ';
        } else {
          interim += transcript;
        }
      }
      
      setTranscript(recordedText + interim, true);
    };

    recognizer.onend = () => {
      console.log('Speech recognition ended');
      stopRecord();
    };

    recognizer.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      showError('Microphone error: ' + event.error);
      stopRecord();
    };

    try {
      recognizer.start();
      console.log('Speech recognition started successfully');
    } catch (error) {
      console.error('Error starting recognition:', error);
      showError('Could not start recording: ' + error.message);
      stopRecord();
    }
  }

  function stopRecord() {
    console.log('Stopping record, recordedText length:', recordedText.length);
    
    isRecording = false;
    
    if (recognizer) {
      recognizer.stop();
    }
    
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => {
        console.log('Stopping track:', track.kind);
        track.stop();
      });
      mediaStream = null;
    }

    const btn = document.getElementById('recordBtn');
    btn.classList.remove('listening');

    if (recordedText.trim().length > 0) {
      console.log('Got text:', recordedText.trim());
      setTranscript(recordedText.trim(), false);
      setStatus('✅ Input captured — press GO to send');
    } else {
      console.log('No text captured');
      setTranscript('', false);
      setStatus('No speech detected — try again');
    }
  }

  // ===== GO BUTTON =====
  function clickGO() {
    console.log('GO button clicked, recordedText:', recordedText);
    
    const text = recordedText.trim();
    
    if (!text || text.length === 0) {
      showError('No input — press Record first');
      return;
    }

    sendToAPI(text);
  }

  async function sendToAPI(text) {
    console.log('Sending to API:', text);
    
    addMsg('user', text);
    recordedText = '';
    setTranscript('', false);
    conversation.push({ role: 'user', content: text });

    setStatus('⏳ Waiting for response...');
    clearError();
    document.getElementById('goBtn').disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: 'You are an expert interview coach. Answer in 2-3 sentences.' },
            ...conversation
          ],
          max_tokens: 300
        })
      });

      console.log('API Response status:', res.status);

      if (!res.ok) {
        showError(`API error ${res.status}`);
        conversation.pop();
        document.getElementById('goBtn').disabled = false;
        return;
      }

      const data = await res.json();
      console.log('API Response:', data);

      if (data.error) {
        showError('API Error: ' + data.error);
        conversation.pop();
        document.getElementById('goBtn').disabled = false;
        return;
      }

      const reply = data.choices[0].message.content;
      addMsg('ai', reply);
      conversation.push({ role: 'assistant', content: reply });

      saveToStorage();
      setStatus('Ready — press Record to continue');
      document.getElementById('goBtn').disabled = false;

    } catch (err) {
      console.error('Fetch error:', err);
      showError('Connection error: ' + err.message);
      conversation.pop();
      document.getElementById('goBtn').disabled = false;
    }
  }

  // ===== UI HELPERS =====
  function addMsg(role, text) {
    const cont = document.getElementById('msgList');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const av = role === 'ai' ? 'D2N' : 'Q';
    const avClass = role === 'ai' ? 'ai' : 'user';
    div.innerHTML = `<div class="avatar ${avClass}">${av}</div><div class="bubble">${text}</div>`;
    cont.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
  }

  function setTranscript(text, rec) {
    const box = document.getElementById('transcriptBox');
    box.textContent = text || 'Audio transcript will appear here...';
    box.className = rec ? 'transcript-box recording' : 'transcript-box';
  }

  function setStatus(text) {
    document.getElementById('statusText').textContent = text;
  }

  function showError(text) {
    document.getElementById('errorText').textContent = text;
    console.error('Error:', text);
  }

  function clearError() {
    document.getElementById('errorText').textContent = '';
  }

  function goTranscripts() {
    window.location.href = 'user-transcripts.html';
  }

  // ===== STORAGE =====
  function saveToStorage() {
    const t = {
      timestamp: new Date().toISOString(),
      username: currentUser,
      conversations: conversation
    };
    const all = JSON.parse(localStorage.getItem('transcripts') || '[]');
    all.push(t);
    localStorage.setItem('transcripts', JSON.stringify(all));
  }

  // ===== INIT =====
  window.addEventListener('load', () => {
    console.log('Page loaded');
    if (localStorage.getItem('currentUser')) {
      currentUser = localStorage.getItem('currentUser');
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('appPage').classList.remove('hidden');
    }
  });
</script>

</body>
</html>
