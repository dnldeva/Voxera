<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voxera</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; }
  
  .hidden { display: none !important; }
  
  #loginPage { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .login-box { width: 100%; max-width: 400px; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .logo { width: 50px; height: 50px; background: #94FF33; border-radius: 8px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #1a1a2e; }
  .login-box h1 { font-size: 24px; color: #1a1a2e; text-align: center; margin-bottom: 8px; }
  .login-box p { text-align: center; color: #999; margin-bottom: 30px; font-size: 13px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 6px; text-transform: uppercase; }
  .form-group input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #EF9F27; }
  .login-btn { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 20px; }
  .login-btn:hover { background: #2a2a4e; }
  .error { color: #c0392b; font-size: 12px; text-align: center; margin-top: 12px; min-height: 16px; }
  
  #appPage { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .app-box { width: 100%; max-width: 650px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
  
  .header { padding: 16px 24px; background: #1a1a2e; display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 36px; height: 36px; background: #94FF33; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #1a1a1a; font-size: 12px; }
  .header-text { flex: 1; }
  .header-text h2 { font-size: 16px; color: white; margin-bottom: 2px; }
  .header-text p { font-size: 9px; color: #EF9F27; text-transform: uppercase; letter-spacing: 1px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 10px; background: rgba(239,159,39,0.15); color: #EF9F27; padding: 3px 10px; border-radius: 20px; }
  .dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; }
  
  .toggle-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #f8f8f5; border-bottom: 1px solid #eee; }
  .toggle-label { font-size: 11px; color: #777; font-weight: 600; }
  .transcripts-link { font-size: 10px; color: #EF9F27; text-decoration: underline; cursor: pointer; }
  
  .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .message { display: flex; gap: 10px; }
  .message.user { flex-direction: row-reverse; }
  .message.ai { flex-direction: row; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai { background: #94FF33; color: #1a1a1a; }
  .avatar.user { background: #1a1a2e; color: #EF9F27; }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
  .message.user .bubble { background: #f0f0f8; color: #1a1a2e; }
  .message.ai .bubble { background: #FFF8EC; color: #5a3e00; }
  
  .transcript-box { margin: 0 16px 10px 16px; min-height: 50px; padding: 10px 14px; background: #f8f8f5; border-radius: 8px; border: 1.5px dashed #ddd; color: #999; font-size: 13px; display: flex; align-items: center; }
  .transcript-box.recording { background: #fff8f8; border-color: #E24B4A; color: #333; }
  
  .bottom { padding: 0; flex-shrink: 0; display: flex; flex-direction: column; border-top: 1px solid #eee; background: #fafafa; }
  
  .status-section { padding: 10px 20px; border-bottom: 1px solid #eee; }
  .status { font-size: 12px; color: #999; min-height: 16px; }
  .error-text { font-size: 11px; color: #c0392b; min-height: 14px; margin-top: 4px; }
  
  .buttons-section { padding: 12px 20px 16px 20px; display: flex; justify-content: flex-end; gap: 12px; }
  
  .btn-record { width: 66px; height: 66px; border-radius: 50%; border: 2.5px solid #1a1a2e; background: white; cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .btn-record:hover { background: #1a1a2e; color: #EF9F27; }
  .btn-record.listening { background: #1a1a2e; color: #E24B4A; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.3)} 50%{box-shadow:0 0 0 10px rgba(226,75,74,0)} }
  
  .btn-go { width: 78px; height: 78px; border-radius: 50%; border: none; background: #1a1a2e; color: #EF9F27; font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(26,26,46,0.3); flex-shrink: 0; }
  .btn-go:hover { background: #2a2a4e; transform: scale(1.05); }
  .btn-go:disabled { opacity: 0.6; cursor: not-allowed; }
  
  .footer { padding: 10px 24px; background: #1a1a2e; font-size: 10px; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <div class="logo">D2N</div>
    <h1>Voxera</h1>
    <p>AI Interview Assistant</p>
    
    <form onsubmit="login(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="alice" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="password123" required />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div class="error" id="loginError"></div>
    </form>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="app-box">
    <div class="header">
      <div class="header-logo">D2N</div>
      <div class="header-text">
        <h2>Voxera</h2>
        <p>D2NL Midea</p>
      </div>
      <div class="header-right">
        <span class="badge">Pro</span>
        <div class="dot"></div>
      </div>
    </div>

    <div class="toggle-bar">
      <span class="toggle-label">🎤 Microphone</span>
      <span class="transcripts-link" onclick="location.href='user-transcripts.html'">📋 My Transcripts</span>
    </div>

    <div class="messages" id="msgList">
      <div class="message ai">
        <div class="avatar ai">D2N</div>
        <div class="bubble">Welcome! Press Record to speak, then GO for an answer.</div>
      </div>
    </div>

    <div class="transcript-box" id="transcript">Audio transcript will appear here...</div>

    <div class="bottom">
      <div class="status-section">
        <div class="status" id="status">Ready — press Record to begin</div>
        <div class="error-text" id="errorMsg"></div>
      </div>
      <div class="buttons-section">
        <button type="button" class="btn-record" id="recordBtn" onclick="record()">🎤</button>
        <button type="button" class="btn-go" id="goBtn" onclick="send()">GO</button>
      </div>
    </div>

    <div class="footer">
      <span>© 2026 D2NL Midea</span>
      <span>Voxera v4.3</span>
    </div>
  </div>
</div>

<script>
  const users = { 'alice': 'password123', 'bob': 'securepass456', 'charlie': 'mypassword789' };
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  let user = null;
  let text = '';
  let history = [];
  let rec = null;
  let isRec = false;
  let stream = null;

  function login(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    
    if (users[u] !== p) {
      document.getElementById('loginError').textContent = 'Wrong username or password';
      return;
    }
    
    user = u;
    localStorage.setItem('user', u);
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
  }

  async function record() {
    if (isRec) {
      stopRec();
      return;
    }

    if (!SR) {
      err('Browser not supported');
      return;
    }

    isRec = true;
    text = '';
    clrErr();
    document.getElementById('recordBtn').classList.add('listening');
    status('🎤 Listening... (click to stop)');
    show('', true);

    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      rec = new SR();
      rec.lang = 'en-GB';
      rec.continuous = true;
      rec.interimResults = true;

      rec.onresult = (e) => {
        let tmp = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) text += e.results[i][0].transcript + ' ';
          else tmp += e.results[i][0].transcript;
        }
        show(text + tmp, true);
      };

      rec.onend = () => stopRec();
      rec.onerror = (e) => { err('Error: ' + e.error); stopRec(); };
      rec.start();
    } catch (e) {
      isRec = false;
      document.getElementById('recordBtn').classList.remove('listening');
      err('Microphone access denied');
    }
  }

  function stopRec() {
    isRec = false;
    if (rec) rec.stop();
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('recordBtn').classList.remove('listening');
    
    if (text.trim()) {
      show(text.trim(), false);
      status('Ready — press GO');
    } else {
      show('', false);
      status('No audio detected');
    }
  }

  async function send() {
    const msg = text.trim();
    if (!msg) { err('Record first'); return; }

    add('user', msg);
    text = '';
    show('', false);
    history.push({ role: 'user', content: msg });
    status('⏳ Waiting...');
    clrErr();
    document.getElementById('goBtn').disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'system', content: 'Expert interview coach. Answer in 2-3 sentences.' }, ...history],
          max_tokens: 300
        })
      });

      if (!res.ok) { err('API error'); history.pop(); document.getElementById('goBtn').disabled = false; return; }
      
      const data = await res.json();
      if (data.error) { err('API error'); history.pop(); document.getElementById('goBtn').disabled = false; return; }
      
      const reply = data.choices[0].message.content;
      add('ai', reply);
      history.push({ role: 'assistant', content: reply });
      
      const t = { timestamp: new Date().toISOString(), username: user, conversations: history };
      const all = JSON.parse(localStorage.getItem('transcripts') || '[]');
      all.push(t);
      localStorage.setItem('transcripts', JSON.stringify(all));
      
      status('Ready — press Record to continue');
      document.getElementById('goBtn').disabled = false;
    } catch (e) {
      err('Error: ' + e.message);
      history.pop();
      document.getElementById('goBtn').disabled = false;
    }
  }

  function add(role, txt) {
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.innerHTML = `<div class="avatar ${role === 'ai' ? 'ai' : 'user'}">${role === 'ai' ? 'D2N' : 'Q'}</div><div class="bubble">${txt}</div>`;
    document.getElementById('msgList').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
  }

  function show(t, rec) {
    const box = document.getElementById('transcript');
    box.textContent = t || 'Audio transcript will appear here...';
    box.className = rec ? 'transcript-box recording' : 'transcript-box';
  }

  function status(t) { document.getElementById('status').textContent = t; }
  function err(t) { document.getElementById('errorMsg').textContent = t; }
  function clrErr() { document.getElementById('errorMsg').textContent = ''; }

  window.addEventListener('load', () => {
    if (localStorage.getItem('user')) {
      user = localStorage.getItem('user');
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('appPage').classList.remove('hidden');
    }
  });
</script>

</body>
</html>
