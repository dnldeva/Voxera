<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voxera  Interview Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0ec; }
  
  .login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .login-screen.hidden { display: none; }
  .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 28px rgba(0,0,0,0.10); width: 100%; max-width: 400px; }
  .login-logo { width: 60px; height: 60px; background: #94FF33; border-radius: 12px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: #1a1a1a; }
  .login-title { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; text-align: center; }
  .login-subtitle { text-align: center; color: #999; margin-bottom: 32px; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 8px; text-transform: uppercase; }
  .form-group input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; }
  .form-group input:focus { outline: none; border-color: #EF9F27; }
  .login-btn { width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 20px; }
  .login-btn:hover { background: #2a2a4e; }
  .login-error { color: #c0392b; text-align: center; margin-top: 16px; font-size: 13px; min-height: 18px; }
  
  .app { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 24px 0; }
  .app.hidden { display: none; }
  .app-container { width: 650px; background: #fff; border-radius: 18px; box-shadow: 0 4px 28px rgba(0,0,0,0.10); overflow: hidden; display: flex; flex-direction: column; }
  
  .header { padding: 16px 24px; background: #1a1a2e; display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 36px; height: 36px; border-radius: 8px; background: #94FF33; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #1a1a1a; flex-shrink: 0; }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name { font-size: 17px; font-weight: 700; color: #fff; }
  .logo-sub { font-size: 10px; color: #EF9F27; letter-spacing: 1.5px; text-transform: uppercase; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .plan-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(239,159,39,0.15); color: #EF9F27; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
  
  .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 20px; background: #f8f8f5; border-bottom: 1px solid #eee; }
  .toggle-label { font-size: 12px; color: #777; }
  .toggle-wrap { position: relative; width: 40px; height: 22px; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 22px; transition: 0.3s; }
  .toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
  input:checked + .toggle-slider { background: #EF9F27; }
  input:checked + .toggle-slider:before { transform: translateX(18px); }
  .transcript-link { cursor: pointer; color: #EF9F27; text-decoration: underline; font-size: 11px; }
  
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; max-height: 360px; }
  .msg { display: flex; gap: 12px; align-items: flex-start; }
  .msg.interviewer { flex-direction: row; }
  .msg.ai { flex-direction: row; }
  .msg.candidate { flex-direction: row-reverse; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .avatar.interviewer-av { background: #1a1a2e; color: #EF9F27; }
  .avatar.ai-av { background: #94FF33; color: #1a1a1a; }
  .avatar.candidate-av { background: #e8f5e9; color: #2e7d32; }
  .bubble { max-width: 80%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.65; }
  .msg.interviewer .bubble { background: #f0f0f8; color: #1a1a2e; border-radius: 4px 14px 14px 14px; border-left: 3px solid #1a1a2e; }
  .msg.ai .bubble { background: #FFF8EC; color: #5a3e00; border-radius: 4px 14px 14px 14px; border-left: 3px solid #EF9F27; }
  .msg.candidate .bubble { background: #e8f5e9; color: #1b5e20; border-radius: 14px 4px 14px 14px; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; margin-bottom: 5px; opacity: 0.55; text-transform: uppercase; }
  
  .transcript-box { margin: 0 16px; min-height: 54px; background: #f8f8f5; border-radius: 10px; padding: 12px 16px; font-size: 14px; color: #777; border: 1.5px dashed #ddd; display: flex; align-items: center; }
  .transcript-box.active { background: #f0f0f8; border-color: #1a1a2e; color: #1a1a2e; }
  .transcript-box.recording { background: #fff8f8; border-color: #E24B4A; color: #333; }
  
  .bottom { padding: 14px 20px 18px; border-top: 1px solid #eee; background: #fafafa; }
  .controls-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 12px; }
  .right-controls { display: flex; align-items: center; gap: 14px; }
  .go-btn { width: 78px; height: 78px; border-radius: 50%; border: none; background: #1a1a2e; color: #EF9F27; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 3px 12px rgba(26,26,46,0.3); display: flex; align-items: center; justify-content: center; }
  .go-btn:hover { background: #2a2a4e; transform: scale(1.05); }
  .go-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .interviewer-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .interviewer-btn button { width: 66px; height: 66px; border-radius: 50%; border: 2.5px solid #1a1a2e; background: #fff; cursor: pointer; font-weight: 600; font-size: 28px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .interviewer-btn button:hover { background: #1a1a2e; color: #EF9F27; }
  .interviewer-btn button.listening { background: #1a1a2e; color: #E24B4A; animation: pulse 1s infinite; }
  .interviewer-btn span { font-size: 11px; color: #1a1a2e; font-weight: 600; text-transform: uppercase; }
  
  .candidate-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .candidate-btn button { width: 66px; height: 66px; border-radius: 50%; border: 2.5px solid #2e7d32; background: #fff; cursor: pointer; font-weight: 600; font-size: 28px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .candidate-btn button:hover { background: #e8f5e9; color: #2e7d32; }
  .candidate-btn button.listening { background: #e8f5e9; color: #E24B4A; animation: pulse 1s infinite; border-color: #E24B4A; }
  .candidate-btn span { font-size: 11px; color: #2e7d32; font-weight: 600; text-transform: uppercase; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.3)} 50%{box-shadow:0 0 0 12px rgba(226,75,74,0)} }
  
  .status { font-size: 13px; color: #999; text-align: center; margin-top: 10px; }
  .error-msg { font-size: 12px; color: #c0392b; text-align: center; margin-top: 4px; }
  .mode-indicator { font-size: 12px; text-align: center; padding: 5px 14px; border-radius: 20px; display: none; margin-bottom: 6px; background: #f0f0f8; color: #1a1a2e; border: 1px solid #1a1a2e; }
  .footer { padding: 10px 24px; background: #1a1a2e; font-size: 11px; color: rgba(255,255,255,0.35); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">D2N</div>
    <h1 class="login-title">Voxera</h1>
    <p class="login-subtitle">AI Interview Assistant</p>
    
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="usernameField" placeholder="e.g., alice" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordField" placeholder="Enter password" required />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<!-- APP SCREEN -->
<div class="app" id="appScreen">
  <div class="app-container">
    <div class="header">
      <div class="logo-mark">D2N</div>
      <div class="logo-text">
        <span class="logo-name">Voxera</span>
        <span class="logo-sub">D2NL Midea</span>
      </div>
      <div class="header-right">
        <span class="plan-badge">Pro</span>
        <div class="status-dot"></div>
      </div>
    </div>

    <div class="toggle-row">
      <div style="display: flex; align-items: center; gap: 8px;">
        <span class="toggle-label">Stereo Mode</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="stereoToggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <span class="transcript-link" onclick="window.location.href='user-transcripts.html'"> My Transcripts</span>
    </div>

    <div class="messages" id="messagesList">
      <div class="msg ai">
        <div class="avatar ai-av">D2N</div>
        <div class="bubble">
          <div class="label">Voxera Assistant</div>
          Welcome! Press <strong>Interviewer</strong> to record questions, then <strong>GO</strong> for answers.
        </div>
      </div>
    </div>

    <div class="transcript-box" id="transcriptBox">Audio transcript will appear here...</div>

    <div class="bottom">
      <div class="mode-indicator" id="modeIndicator"></div>
      <div class="controls-row">
        <div class="candidate-btn">
          <button id="candidateMicBtn" onclick="startRecording('candidate')" title="Record your response"></button>
          <span>Respond</span>
        </div>
        <div class="right-controls">
          <div class="interviewer-btn">
            <button id="interviewerMicBtn" onclick="startRecording('interviewer')" title="Record interviewer question"></button>
            <span>Interviewer</span>
          </div>
          <button class="go-btn" id="goBtn" onclick="submitQuestion()">GO</button>
        </div>
      </div>
      <div class="status" id="status">Ready  press Interviewer to begin</div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="footer">
      <span> 2026 D2NL Midea</span>
      <span>Voxera v2.3</span>
    </div>
  </div>
</div>

<script>
  // ============== GLOBAL STATE ==============
  let speechRecognition = null;
  let isRecording = false;
  let currentText = '';
  let currentMode = null;
  let mediaStream = null;
  let conversationHistory = [];

  const VALID_USERS = {
    'alice': 'password123',
    'bob': 'securepass456',
    'charlie': 'mypassword789'
  };

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  // ============== LOGIN ==============
  function handleLogin(event) {
    event.preventDefault();
    const username = document.getElementById('usernameField').value.trim();
    const password = document.getElementById('passwordField').value.trim();

    if (!VALID_USERS[username] || VALID_USERS[username] !== password) {
      document.getElementById('loginError').textContent = 'Invalid username or password';
      document.getElementById('passwordField').value = '';
      return;
    }

    window.currentUsername = username;
    localStorage.setItem('currentUser', username);
    showApp();
  }

  function showApp() {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
  }

  // ============== RECORDING ==============
  async function startRecording(mode) {
    if (!SR) {
      showError('Please use Chrome or Edge browser');
      return;
    }

    if (isRecording) {
      stopRecording();
      return;
    }

    isRecording = true;
    currentMode = mode;
    currentText = '';
    clearError();

    const btnId = mode === 'interviewer' ? 'interviewerMicBtn' : 'candidateMicBtn';
    document.getElementById(btnId).classList.add('listening');
    setModeIndicator(mode);
    setTranscript('', 'recording');
    setStatus(mode === 'interviewer' ? ' Recording (system audio)...' : ' Recording (microphone)...');

    try {
      if (mode === 'interviewer' && document.getElementById('stereoToggle').checked) {
        // Get system audio via screen share
        mediaStream = await navigator.mediaDevices.getDisplayMedia({
          video: false,
          audio: { echoCancellation: false, noiseSuppression: false }
        });
      } else {
        // Get microphone
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }

      startSpeechRecognition(mode);
    } catch (error) {
      isRecording = false;
      document.getElementById(btnId).classList.remove('listening');
      showError('Microphone/screen share access denied');
    }
  }

  function startSpeechRecognition(mode) {
    speechRecognition = new SR();
    speechRecognition.lang = 'en-GB';
    speechRecognition.continuous = true;
    speechRecognition.interimResults = true;

    speechRecognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          currentText += transcript + ' ';
        } else {
          interim += transcript;
        }
      }
      setTranscript(currentText + interim, 'recording');
    };

    speechRecognition.onend = () => {
      stopRecording();
    };

    speechRecognition.onerror = (event) => {
      showError('Microphone error: ' + event.error);
      stopRecording();
    };

    speechRecognition.start();
  }

  function stopRecording() {
    isRecording = false;
    if (speechRecognition) {
      speechRecognition.stop();
    }
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
      mediaStream = null;
    }

    const interviewerBtn = document.getElementById('interviewerMicBtn');
    const candidateBtn = document.getElementById('candidateMicBtn');
    interviewerBtn.classList.remove('listening');
    candidateBtn.classList.remove('listening');
    clearModeIndicator();

    if (currentText.trim()) {
      setTranscript(currentText.trim(), currentMode);
      setStatus('Input captured  press GO');
    } else {
      setTranscript('', '');
      setStatus('No speech detected  try again');
    }
  }

  // ============== API ==============
  async function submitQuestion() {
    const text = currentText.trim();
    if (!text) {
      showError('No input captured  press Interviewer or Respond first');
      return;
    }

    addMessage(currentMode || 'interviewer', text);
    currentText = '';
    setTranscript('', '');
    conversationHistory.push({ role: 'user', content: text });

    setStatus(' Thinking...');
    clearError();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: 'You are an expert interview coach. Answer concisely in 2-3 sentences.' },
            ...conversationHistory
          ],
          max_tokens: 300
        })
      });

      const data = await response.json();

      if (data.error) {
        showError('API Error: ' + data.error);
        conversationHistory.pop();
        return;
      }

      const reply = data.choices[0].message.content;
      addMessage('ai', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

      saveTranscript();
      setStatus('Ready  press Interviewer or Respond to continue');
    } catch (error) {
      showError('Connection error: ' + error.message);
      conversationHistory.pop();
    }
  }

  // ============== UI ==============
  function addMessage(role, text) {
    const container = document.getElementById('messagesList');
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const avatarClass = role === 'ai' ? 'ai-av' : role === 'candidate' ? 'candidate-av' : 'interviewer-av';
    const label = role === 'ai' ? 'Voxera Insight' : role === 'candidate' ? 'Your Response' : 'Captured Input';
    msg.innerHTML = `
      <div class="avatar ${avatarClass}">${role === 'ai' ? 'D2N' : role === 'candidate' ? 'YOU' : 'Q'}</div>
      <div class="bubble">
        <div class="label">${label}</div>
        ${text}
      </div>
    `;
    container.appendChild(msg);
    msg.scrollIntoView({ behavior: 'smooth' });
  }

  function setTranscript(text, mode) {
    const box = document.getElementById('transcriptBox');
    box.textContent = text || 'Audio transcript will appear here...';
    box.className = 'transcript-box' + (mode ? ' ' + mode : '');
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
  }

  function clearError() {
    document.getElementById('errorMsg').textContent = '';
  }

  function setModeIndicator(mode) {
    const indicator = document.getElementById('modeIndicator');
    indicator.style.display = 'block';
    indicator.textContent = mode === 'interviewer' ? ' System audio mode' : ' Microphone mode';
  }

  function clearModeIndicator() {
    document.getElementById('modeIndicator').style.display = 'none';
  }

  // ============== STORAGE ==============
  function saveTranscript() {
    const transcript = {
      timestamp: new Date().toISOString(),
      username: window.currentUsername,
      conversations: conversationHistory
    };
    const transcripts = JSON.parse(localStorage.getItem('transcripts') || '[]');
    transcripts.push(transcript);
    localStorage.setItem('transcripts', JSON.stringify(transcripts));
  }

  // ============== INIT ==============
  window.addEventListener('load', () => {
    if (localStorage.getItem('currentUser')) {
      showApp();
    }
  });
</script>

</body>
</html>
